name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# A new push supersedes any in-flight deploy on the same branch.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Reusable across other static-export Next.js sites: change CF_PROJECT to the
# Cloudflare Pages project name and PROD_HOST to the production hostname.
env:
  CF_PROJECT: johndegraft-app
  PROD_HOST: johndegraft.app
  # Smoke test runs against the unprotected pages.dev origin to bypass the
  # Cloudflare Bot Fight Mode challenge that the custom domain enforces. The
  # apex still serves the same artefact, so this is sufficient for go/no-go.
  SMOKE_HOST: johndegraft-app.pages.dev
  SMOKE_PATHS: "/ /rag /audit"
  # Pages-Functions smoke: HEAD a function route. 200/405 = function exists,
  # 404 = deploy didn't include functions/ (the failure mode we just fixed).
  # ukhealth-chat is the cheapest — it proxies an external GET, no secrets required.
  SMOKE_FUNCTION_PATH: "/api/ukhealth-chat"

jobs:
  # Gate 1 — never deploy code that doesn't typecheck.
  # TODO: add `npm run lint -- --max-warnings=0` once ESLint is initialized
  # (run `npx next lint` once locally to scaffold .eslintrc.json).
  validate:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  build:
    name: Build (next export)
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
      - name: Verify out/ exists and is non-empty
        run: |
          test -d out || { echo "::error::next build did not produce out/ — check next.config.mjs has output: 'export'"; exit 1; }
          test -s out/index.html || { echo "::error::out/index.html is empty or missing"; exit 1; }
          echo "out/ size: $(du -sh out | cut -f1)"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-out
          path: out/
          retention-days: 3
          if-no-files-found: error

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Don't deploy from forked-PR runs — they don't have access to secrets and
    # would expose us to credential-leak vectors if we tried.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    outputs:
      url: ${{ steps.cf.outputs.deployment-url }}
    steps:
      # Checkout is needed so `functions/` and `wrangler.toml` sit at the
      # deploy job's CWD — wrangler v3 picks up `./functions/` automatically
      # when deploying via `pages deploy <static-dir>`, but only from CWD.
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-out
          path: out
      - name: Sanity-check functions/ presence
        run: |
          test -d functions || { echo "::error::functions/ missing at deploy CWD — Pages Functions will not be uploaded"; exit 1; }
          echo "functions/ contains: $(ls functions/api/ | tr '\n' ' ')"
      - name: Deploy
        id: cf
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.GLOBAL_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # On main → production. Other branches → preview deploy at <branch>.<project>.pages.dev
          command: pages deploy out --project-name=${{ env.CF_PROJECT }} --branch=${{ github.head_ref || github.ref_name }}

  smoke:
    name: Post-deploy smoke test
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Curl production paths and fail on non-200
        run: |
          set -euo pipefail
          fail=0
          for p in $SMOKE_PATHS; do
            for attempt in 1 2 3 4 5; do
              code=$(curl -sS -o /dev/null -w '%{http_code}' "https://$SMOKE_HOST$p" || echo 000)
              if [ "$code" = "200" ]; then
                echo "✓ $p → $code"
                break
              fi
              echo "  attempt $attempt: $p → $code (retrying in 6s)"
              sleep 6
              if [ "$attempt" = "5" ]; then
                echo "::error::$p returned $code after 5 attempts"
                fail=1
              fi
            done
          done
          # Pages Function reachability check — 404 means the deploy lost
          # functions/ (e.g. regressing past commit 4a5e8d0). Accept any non-404
          # because the route may require POST or env secrets to return 200.
          fcode=$(curl -sS -o /dev/null -w '%{http_code}' -X OPTIONS "https://$SMOKE_HOST$SMOKE_FUNCTION_PATH" || echo 000)
          if [ "$fcode" = "404" ]; then
            echo "::error::$SMOKE_FUNCTION_PATH returned 404 — Pages Functions were not deployed"
            fail=1
          else
            echo "✓ $SMOKE_FUNCTION_PATH → $fcode (function present)"
          fi
          exit $fail
