name: cf-disable-bot-fight

# One-shot workflow to disable Cloudflare Bot Fight Mode on johndegraft.app
# and audit any WAF custom rules that are challenging the apex. The DNS
# revert (cf-revert-dns) put the apex back on Cloudflare Pages but the
# zone is now firing `cf-mitigated: challenge` on every apex request,
# blocking link previews, OG scrapers, and uptime checks.

on:
  workflow_dispatch:

jobs:
  disable:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Prefer the broader token; fall back to the DNS-edit token if that
      # is the only one with zone visibility. Either token must have
      # Zone Settings:Edit + Bot Management Write on johndegraft.app.
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_DNS_EDIT_TOKEN }}
      ZONE: johndegraft.app
    steps:
      - name: Verify token + resolve zone
        id: zone
        run: |
          set -e
          echo "Token length: ${#CF_TOKEN}"
          curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            | jq '{success, status:.result.status}'
          zone_id=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=$ZONE" | jq -r '.result[0].id // empty')
          if [ -z "$zone_id" ]; then
            echo "::error::zone $ZONE not visible to token"
            exit 1
          fi
          echo "zone_id=$zone_id" >> "$GITHUB_OUTPUT"
          echo "Resolved zone $ZONE -> $zone_id"

      - name: Read current Bot Fight Mode state
        env:
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          set -e
          echo "=== /bot_management (modern endpoint) ==="
          curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/bot_management" \
            | jq '{success, errors, result}'

      - name: Disable Bot Fight Mode (fight_mode=false)
        env:
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          set -e
          echo "=== PUT /bot_management { fight_mode: false } ==="
          curl -sS -X PUT -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/bot_management" \
            -d '{"fight_mode": false}' \
            | jq '{success, errors, result}'

      - name: Lower security level to "essentially_off" (zone setting)
        env:
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          set -e
          echo "=== PATCH /settings/security_level -> essentially_off ==="
          curl -sS -X PATCH -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/security_level" \
            -d '{"value":"essentially_off"}' \
            | jq '{success, errors, name:.result.id, value:.result.value}'

      - name: Disable Browser Integrity Check
        env:
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          set -e
          echo "=== PATCH /settings/browser_check -> off ==="
          curl -sS -X PATCH -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/browser_check" \
            -d '{"value":"off"}' \
            | jq '{success, errors, name:.result.id, value:.result.value}'

      - name: Audit WAF custom rulesets for challenge actions
        env:
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          set -e
          echo "=== Listing zone-level rulesets ==="
          rulesets=$(curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/rulesets")
          echo "$rulesets" | jq '{success, ids:[.result[] | {id, name, phase, kind}]}'
          echo ""
          echo "=== Per-ruleset detail (filtering challenge/js_challenge/managed_challenge rules) ==="
          for rid in $(echo "$rulesets" | jq -r '.result[].id'); do
            echo "--- ruleset $rid ---"
            curl -sS -H "Authorization: Bearer $CF_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/rulesets/$rid" \
              | jq '{phase:.result.phase, name:.result.name,
                     challenge_rules:[.result.rules[]?
                       | select(.action == "challenge" or .action == "js_challenge" or .action == "managed_challenge")
                       | {id, action, expression, enabled, description}]}'
          done

      - name: Smoke test apex
        run: |
          set +e
          UA='Mozilla/5.0 (Macintosh; Intel Mac OS X 14_5) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.5 Safari/605.1.15'
          echo "=== curl -sI https://johndegraft.app ==="
          curl -sI -A "$UA" https://johndegraft.app | head -15
          echo "=== marker check (propfirmbot) ==="
          if curl -s -A "$UA" https://johndegraft.app | grep -q propfirmbot; then
            echo "[OK] propfirmbot marker present at apex"
          else
            echo "[WARN] still challenged or cached — Cloudflare edge can take 30-60s to propagate setting changes"
          fi
