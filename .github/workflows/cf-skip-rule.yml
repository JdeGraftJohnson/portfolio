name: cf-skip-rule

# One-shot workflow to add a Cloudflare WAF Custom Rule that skips bot
# management (Bot Fight Mode + Super BFM + Browser Integrity Check) for
# /api/* paths so Pages Functions are callable from browser fetch().
#
# Trigger manually via:  gh workflow run cf-skip-rule.yml
on:
  workflow_dispatch:
    inputs:
      zone_id:
        description: "Cloudflare Zone ID (skips zone discovery if provided)"
        required: false
        default: ""

jobs:
  create-skip-rule:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ZONE_NAME: johndegraft.app
      RULE_DESCRIPTION: "Skip bot management for Pages Functions (/api/*)"
      EXPR: '(starts_with(http.request.uri.path, "/api/"))'
    steps:
      - name: Verify secrets are wired (lengths only)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_ZONE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_ZONE_API_TOKEN length: ${#CF_TOKEN}"
          echo "CLOUDFLARE_ACCOUNT_ID length:    ${#CF_ACCOUNT_ID}"
          if [ "${#CF_TOKEN}" -lt 20 ]; then
            echo "::error::CLOUDFLARE_ZONE_API_TOKEN is empty or too short — secret not bound to this repo/workflow"
            exit 1
          fi

      - name: Inspect token capabilities (no secret echoed)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_ZONE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "=== /user/tokens/verify ==="
          curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            | jq '{success, errors, status:.result.status, id_last4:(.result.id // "" | .[-4:]), expires:.result.expires_on}'
          echo "=== /accounts (visible to token) ==="
          curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts?per_page=10" \
            | jq '{success, errors, accounts:[.result[]? | {id_last4:(.id[-4:]), name:.name}]}'
          echo "=== /accounts/{stored_id}/tokens/permission_groups (introspect on stored account) ==="
          if [ -n "$CF_ACCOUNT_ID" ]; then
            curl -sS -H "Authorization: Bearer $CF_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}" \
              | jq '{success, errors, account_visible:(.result != null)}'
          fi

      - name: Resolve zone ID
        id: zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_ZONE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ZONE_ID_INPUT: ${{ inputs.zone_id }}
        run: |
          set -e
          if [ -n "$ZONE_ID_INPUT" ]; then
            echo "Using zone ID from workflow input"
            echo "zone_id=$ZONE_ID_INPUT" >> "$GITHUB_OUTPUT"
            echo "Zone (last 4): …${ZONE_ID_INPUT: -4}"
            exit 0
          fi
          # Strategy 1: filtered list by name
          R1=$(curl -sS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=${ZONE_NAME}")
          ZONE_ID=$(echo "$R1" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE_ID" ]; then
            echo "Strategy 1 (filter by name) returned empty. Raw response:"
            echo "$R1" | jq '. | {success, errors, messages, result_info, result_len:(.result|length)}'
            # Strategy 2: list ALL zones the token can see + match locally
            R2=$(curl -sS \
              -H "Authorization: Bearer $CF_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones?per_page=50")
            ZONE_ID=$(echo "$R2" | jq -r --arg n "$ZONE_NAME" '.result[]? | select(.name == $n) | .id' | head -n1)
            if [ -z "$ZONE_ID" ]; then
              echo "Strategy 2 (unfiltered list) also empty. Zone names visible to token:"
              echo "$R2" | jq -r '.result[]?.name'
              echo "Raw error:"
              echo "$R2" | jq '. | {success, errors, messages}'
            fi
          fi
          if [ -z "$ZONE_ID" ]; then
            # Strategy 3: account-scoped zone list
            if [ -n "$CF_ACCOUNT_ID" ]; then
              R3=$(curl -sS \
                -H "Authorization: Bearer $CF_TOKEN" \
                "https://api.cloudflare.com/client/v4/zones?account.id=${CF_ACCOUNT_ID}&per_page=50")
              ZONE_ID=$(echo "$R3" | jq -r --arg n "$ZONE_NAME" '.result[]? | select(.name == $n) | .id' | head -n1)
              if [ -z "$ZONE_ID" ]; then
                echo "Strategy 3 (account-scoped) also empty:"
                echo "$R3" | jq '. | {success, errors, messages, result_len:(.result|length)}'
              fi
            fi
          fi
          if [ -z "$ZONE_ID" ]; then
            echo "::error::Zone ${ZONE_NAME} not resolvable. Token needs at least Zone:Read on this zone."
            exit 1
          fi
          echo "zone_id=$ZONE_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved zone (last 4 of id): …${ZONE_ID: -4}"

      - name: Diagnose token capabilities on this zone
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_ZONE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          set -e
          echo "=== GET /zones/{zone_id} (basic Zone:Read) ==="
          curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}" \
            | jq '{success, errors, name:.result.name, status:.result.status}'
          echo ""
          echo "=== GET /zones/{zone_id}/rulesets (list — needs Zone WAF:Read) ==="
          curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/rulesets" \
            | jq '{success, errors, rulesets:[.result[]? | {phase, name, kind, id_last4:(.id[-4:])}]}'
          echo ""
          echo "=== GET phases/http_request_firewall_custom/entrypoint ==="
          curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/rulesets/phases/http_request_firewall_custom/entrypoint" \
            | jq '{success, errors, id_last4:((.result.id // "") | .[-4:]), rule_count:((.result.rules // []) | length)}'

      - name: Resolve custom firewall ruleset entrypoint
        id: ruleset
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_ZONE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          set -e
          RS=$(curl -sS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/rulesets/phases/http_request_firewall_custom/entrypoint")
          # Cloudflare often returns a non-success body when no entrypoint exists yet.
          RS_ID=$(echo "$RS" | jq -r '.result.id // empty')
          if [ -z "$RS_ID" ]; then
            echo "GET entrypoint returned no id. Body:"
            echo "$RS" | jq '. | {success, errors}'
            echo "Attempting to create new ruleset…"
            CREATE_RAW=$(curl -sS -X POST \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -w "\n__HTTP__%{http_code}" \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/rulesets" \
              -d '{
                "name": "default",
                "description": "Default custom ruleset",
                "kind": "zone",
                "phase": "http_request_firewall_custom",
                "rules": []
              }')
            CREATE_BODY=$(echo "$CREATE_RAW" | sed '/__HTTP__/d')
            CREATE_CODE=$(echo "$CREATE_RAW" | awk -F__HTTP__ 'NF>1 {print $2}')
            echo "POST status=${CREATE_CODE}"
            echo "$CREATE_BODY" | jq '. | {success, errors}'
            RS_ID=$(echo "$CREATE_BODY" | jq -r '.result.id // empty')
            if [ -z "$RS_ID" ]; then
              echo "::error::Could not create or read entrypoint ruleset. Likely missing Zone WAF:Edit on this zone."
              exit 1
            fi
          fi
          echo "ruleset_id=$RS_ID" >> "$GITHUB_OUTPUT"
          echo "Ruleset (last 4): …${RS_ID: -4}"

      - name: Check for existing rule by description
        id: existing
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_ZONE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
          RS_ID: ${{ steps.ruleset.outputs.ruleset_id }}
        run: |
          set -e
          BODY=$(curl -fsS \
            -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/rulesets/${RS_ID}")
          EXISTING_ID=$(echo "$BODY" | jq -r --arg d "$RULE_DESCRIPTION" \
            '.result.rules[]? | select(.description == $d) | .id' | head -n1)
          if [ -n "$EXISTING_ID" ]; then
            echo "existing_id=$EXISTING_ID" >> "$GITHUB_OUTPUT"
            echo "Found existing rule: …${EXISTING_ID: -4}"
          else
            echo "No existing rule found — will create"
          fi

      - name: Create or update skip rule
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_ZONE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
          RS_ID: ${{ steps.ruleset.outputs.ruleset_id }}
          EXISTING_ID: ${{ steps.existing.outputs.existing_id }}
        run: |
          set -e
          PAYLOAD=$(jq -n \
            --arg expr  "$EXPR" \
            --arg desc  "$RULE_DESCRIPTION" \
            '{
              action: "skip",
              expression: $expr,
              description: $desc,
              enabled: true,
              action_parameters: {
                ruleset: "current",
                phases: ["http_request_sbfm"],
                products: ["bic", "securityLevel", "uaBlock", "zoneLockdown"]
              }
            }')
          if [ -n "$EXISTING_ID" ]; then
            echo "Updating rule $EXISTING_ID …"
            curl -fsS -X PATCH \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/rulesets/${RS_ID}/rules/${EXISTING_ID}" \
              -d "$PAYLOAD" | jq -r '"updated rule \(.result.rules[]? | select(.id == env.EXISTING_ID) | .id // "?")"' || true
          else
            echo "Creating new rule …"
            curl -fsS -X POST \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/rulesets/${RS_ID}/rules" \
              -d "$PAYLOAD" | jq -r '"created rule with action=\(.result.rules[-1].action) expr=\(.result.rules[-1].expression)"'
          fi
          echo "OK"

      - name: Verify /api/* now passes through bot management
        run: |
          set -e
          sleep 8  # let propagation settle
          for path in /api/clinical-chat /api/ukhealth-chat; do
            HTTP=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
              "https://johndegraft.app${path}")
            CT=$(curl -sI "https://johndegraft.app${path}" | awk -F': ' '/^content-type/ {print $2}' | tr -d '\r')
            BODY=$(head -c 120 /tmp/body.txt)
            echo "${path}  status=${HTTP}  content-type=${CT}"
            echo "  body: ${BODY}"
            if echo "$BODY" | grep -q '"status":"ok"'; then
              echo "  ✅ passes through"
            elif [ "$HTTP" = "200" ] && echo "$CT" | grep -q "application/json"; then
              echo "  ✅ returns JSON"
            else
              echo "::warning::${path} did not return JSON — bot challenge may still be active"
            fi
          done
